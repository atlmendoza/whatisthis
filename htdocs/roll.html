<!DOCTYPE html>
<html>
	<head>
		<title>Transition and Animation Exercises</title>
		<meta charset="UTF-8">
    	<meta name="description" content="Sample Code to implement transform and transition">
	    <meta name="author" content="A.L. Mendoza & M.Tarcelo">
	    <meta name="revised" content="12/04/2022">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<style>
      		* {box-sizing: border-box}
			div{
				transition: all 0.5s;
			}
			
			#roll{
				width: 400px;
				height: 400px;
				margin: 30px auto;
				position: relative;
			}
			#roll img{
				width: 100%;
		        heigth: 100%;
		        opacity: 0.75;
			}
     		 #roll img:hover{
				opacity: 1;
			}
			#roll div{
				position: absolute;
				width: 200px;
				height: 200px;
			}
			#roll div:first-of-type{
        		top: 0px;
				left: 0px;
				background-color: red;
				transform-origin: top left;
			}
			#roll div:nth-of-type(2){
       			 top: 0px;
				right: 0px;
				background-color: yellow;
				transform-origin: top right;
			}
			#roll div:nth-of-type(3){
        		bottom: 0px;
				left: 0px;
				background-color: blue;
				transform-origin: bottom right;
			}
			#roll div:last-of-type{
        		bottom: 0px;
				right: 0px;
				background-color: green;
				transform-origin: bottom right;
			}
			#roll:hover div:first-of-type, 
		      #roll:hover div:last-of-type
		      {
				transform: skew(-45deg);
			}
			#roll:hover div:nth-of-type(2), 
		      #roll:hover div:nth-of-type(3)
		      {
				transform: skew(45deg);
			}

		      p {
		        text-align: center;
		      }
		</style>
	</head>
	<body>
		<div id="roll">
			<p><a href="../index.html"> 
        <img src="../images/funny.jpg"/>
      </a>
      </p>
			<div></div>
			<div></div>
			<div></div>
			<div></div>
		</div>
    <p>Click on the Image for Home<br/>
    Source: https://www.ba-bamail.com/cute-overload/75-of-the-cutest-kittens-in-the-world/
    </p>
    
	</body>
</html>
